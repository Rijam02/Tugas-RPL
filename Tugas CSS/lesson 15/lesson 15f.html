<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 15f</title>
</head>
<body>
    <div class="product">
        <img src="https://img.freepik.com/vektor-premium/kaos-putih-dengan-latar-belakang-abu-abu-ilustrasi-3d-kaos-putih-dengan-latar-belakang-abu-abu-ilustrasi-3d_912214-14894.jpg" >
        <div class="discount">20% OFF</div>

        <div class="overlay">
            <button>Add to Cart</button>
        </div>
    </div>

    <style>
        .body {
            height:3000px;
        }
        .product {
            position: relative;
            display: inline-block;
        }
        .product img {
            height: 300px;
            width: 300px;
        }
        .discount {
            position: absolute;
            top: 10px;
            right: 10px;

            background-color: black;
            color: white;
            padding: 5px;
            font-size: 12px;
        }
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;

            height: 80px;
            background-color: rgba(255, 255, 255, 0.7);

            display: flex;
            align-items: center;
            justify-content: center;
        }
        .overlay button {
            padding: 8px 12px;
            border: 1px solid black;
            background-color: white;
            cursor: pointer;
        }
    </style>
    
</body>
</html>
