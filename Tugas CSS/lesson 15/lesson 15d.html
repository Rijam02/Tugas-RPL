<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 15d</title>
</head>
<body>
    <div class="box">
        <div class="close-btn">X</div>
        <div class="time">0:29</div>
    </div>

    <style>
        body {
            height: 3000px;
        }

        .box {
            position: fixed;
            right: 20px;
            bottom: 20px;

            height: 180px;
            width: 320px;
            background-color: gray;

        }
        .close-btn {
            position: absolute;
            top: -10px;
            left: -10px;

            background-color: black;
            color: white;
            height: 30px;
            width: 30px;
            border-radius: 50%;

            display: flex;
            justify-content: center;
            align-items: center;

            font-weight: bold;
        }
        .time {
            position: absolute;
            bottom: 5px;
            right: 5px;

            background-color: black;
            color: white;
            padding: 3px 6px;
            font-size: 20px;
        }
    </style>
    
</body>
</html>
