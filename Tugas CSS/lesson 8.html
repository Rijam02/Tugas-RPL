<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 8</title>
    <link rel="stylesheet" href="style lesson 8.css">
</head>
<body>
    <h2>8a.</h2>
    <input type="text" placeholder="Name" class="input1">
    <input type="text" placeholder="Email" class="input2">

    <h2>8b.</h2>
    <p class="text-b">Thanks fo chatting with our customer support. Would you like to take our quick survey?</p>
    <button class="btn">Yes</button>
    <button class="btn">No</button>

    <h2>8c.</h2>
    <div class="google">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/Google_2015_logo.svg/960px-Google_2015_logo.svg.png" class="logo">
        <input type="text" placeholder="Search Google or type a URL" class="search">
    </div>

    <h2>8d.</h2>
    <div class="sign-up">
        <input type="text" placeholder="First name" class="name">
        <input type="text" placeholder="Last name" class="name">
        <input type="text" placeholder="Email" class="email">
        <button class="sign">Sign up</button>
    </div>

    <h2>8e.</h2>
    <div class="uber-box">
        <h1>Request a ride now</h1>
        <input type="text" placeholder="Enter pickup location" class="enter">
        <input type="text" placeholder="Enter destination" class="enter">
        <button class="now">Request now</button>
        <button class="for">Schedul for later</button>

    </div>
</body>
</html>
