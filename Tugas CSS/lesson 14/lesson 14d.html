<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 14d</title>
<body>
    <div class="overlay">
        <div class="modal">
            <h2>Modal Title</h2>
            <p>This is a modal</p>
            <button>Close</button>
        </div>
    </div>

    <style>
        body {
            height: 3000px;
        }
        .overlay {
            position: fixed;
            top: 0px;
            bottom: 0px;
            right: 0px;
            left: 0px;

            background-color: rgba(0, 0, 0 , 0.8);

            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            width: 300px;
        }
    </style>
   
    
</body>
</html>
