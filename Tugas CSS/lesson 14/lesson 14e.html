<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 14e</title>
<body>
    <div class="header">
        
        <div class="left">
            <img src="https://headsupfortails.com/cdn/shop/articles/Banner_0349af78-55fb-4814-9fe7-c08abe2bdbf4.jpg?v=1755865772" class="photo">
            <span>Oliver Cat</span>
        </div>

        <div class="right">
            <button class="add">Add Friend</button>
            <button class="message">Message</button>
        </div>

    </div>

    <style>
        body {
            height: 3000px;
            margin: 0;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background-color: white;

            display: flex;
            justify-content: center;
            align-items: center;

            justify-content: space-between;
            padding: 0 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .photo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }
        .right {
            display: flex;
            gap: 10px;
        }
        .add {
            background-color: #1877f2;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
        }
        .message {
            background-color: #e4e6eb;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
         }
    </style>
   
    
</body>
</html>
